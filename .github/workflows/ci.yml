name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/MtgoDecklistScraperNet/MtgoDecklistScraperNet.csproj --configuration Release --no-build --output ./publish

      - name: Package artifact
        run: zip -r MtgoDecklistScraperNet.zip publish

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MtgoDecklistScraperNet
          path: MtgoDecklistScraperNet.zip

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: MtgoDecklistScraperNet.zip
